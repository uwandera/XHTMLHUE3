<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XHTML HUE3</title>
    <style>
        body {
            display: flex;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        #sidebar {
            width: 200px;
            background-color: #f1f1f1;
            padding: 15px;
            height: 100vh;
        }
        #main {
            flex-grow: 1;
            padding: 20px;
        }
        a {
            display: block;
            padding: 8px;
            text-decoration: none;
            color: #333;
            margin: 5px 0;
        }
        a:hover {
            background-color: #ddd;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>XHTML HUE3</h1>
        <img src="https://via.placeholder.com/150" alt="Image Placeholder" />
    </header>
    <div id="sidebar">
        <a href="login.html">Login</a>
        <a href="home.html">Home</a>
        <a href="funcionarios.html">Funcionários</a>
        <a href="cadastro.html">Cadastro</a>
    </div>
    <div id="main">
        <iframe src="home.html" name="iframe_target"></iframe>
    </div>
</body>
</html>
